<svg viewBox="0 0 2887 808" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      .wave-light { fill: #5DADE2; }
      .wave-medium { fill: #1F618D; }
      .wave-dark { fill: #0B4F8C; }
      .text-main { font-family: Arial, sans-serif; font-weight: 800; fill: #001F5C; }
      .text-sub { font-family: Arial, sans-serif; font-weight: 300; fill: #5B7FA6; }
    </style>
  </defs>

  <!-- Wave pattern - left side -->
  <g id="wave-pattern">
    <!-- Top wave - light -->
    <path class="wave-light" d="M 137 130 Q 200 130 200 210 L 200 280 Q 200 330 170 330 L 137 330 Q 30 330 30 250 L 30 170 Q 30 130 137 130"/>

    <!-- Second wave - medium -->
    <path class="wave-medium" d="M 137 330 L 200 330 Q 200 330 200 410 Q 200 460 170 460 L 137 460 Q 30 460 30 380 L 30 350 Q 30 330 137 330"/>

    <!-- Third wave - dark -->
    <path class="wave-dark" d="M 137 460 L 170 460 Q 200 460 200 540 Q 200 590 137 590 L 30 590 L 30 480 Q 30 460 137 460"/>

    <!-- Bottom section - dark -->
    <path class="wave-dark" d="M 30 590 L 170 590 Q 200 590 200 650 Q 200 700 137 700 L 30 700 L 30 610"/>
  </g>

  <!-- Si-Ware Text -->
  <text x="550" y="480" class="text-main" font-size="320" letter-spacing="-8">Si-Ware</text>

  <!-- Systems Text -->
  <text x="550" y="680" class="text-sub" font-size="200" letter-spacing="2">Systems</text>

  <!-- TM Superscript -->
  <text x="2750" y="240" class="text-main" font-size="100" font-weight="bold">TM</text>
</svg>
