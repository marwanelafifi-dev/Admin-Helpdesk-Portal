<svg viewBox="0 0 2887 808" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Wave pattern - left side -->
  <g id="waves">
    <!-- Top wave - light cyan/blue -->
    <path d="M 290 100 Q 380 100 400 200 L 400 320 Q 400 380 360 380 L 290 380 Q 80 380 80 280 L 80 180 Q 80 100 290 100" fill="#4DB8D9"/>

    <!-- Second wave - medium blue -->
    <path d="M 290 380 L 400 380 Q 400 380 400 500 Q 400 560 360 560 L 290 560 Q 80 560 80 460 L 80 400 Q 80 380 290 380" fill="#0A7FB8"/>

    <!-- Third wave - dark blue -->
    <path d="M 290 560 L 360 560 Q 400 560 400 680 Q 400 740 290 740 L 80 740 L 80 600 Q 80 560 290 560" fill="#004080"/>

    <!-- Bottom wave - very dark -->
    <path d="M 80 740 L 360 740 Q 400 740 400 750 L 400 750 Q 400 750 290 750 L 80 750 L 80 750" fill="#002050"/>
  </g>

  <!-- Si-Ware Text - Dark Navy Blue -->
  <text x="550" y="520" font-family="Arial, Helvetica, sans-serif" font-size="420" font-weight="900" fill="#001F5C" letter-spacing="-15" dominant-baseline="middle">
    Si-Ware
  </text>

  <!-- Systems Text - Medium Blue -->
  <text x="900" y="680" font-family="Arial, Helvetica, sans-serif" font-size="260" font-weight="300" fill="#6B8FC5" letter-spacing="8" dominant-baseline="middle">
    Systems
  </text>

  <!-- TM Superscript -->
  <text x="2720" y="280" font-family="Arial, Helvetica, sans-serif" font-size="140" font-weight="bold" fill="#001F5C" dominant-baseline="middle">
    TM
  </text>
</svg>
