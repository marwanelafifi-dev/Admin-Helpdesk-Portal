# Production-oriented stack: Postgres + Next.js (standalone image).
# Copy `.env.example` → `.env` and set secrets before `docker compose up`.
#
# Migrations: run once when the DB is up, from your machine or CI:
#   DATABASE_URL="postgresql://USER:PASS@localhost:5432/DB?schema=public" npx prisma migrate deploy
# (Expose db port 5432 locally as below, or use the internal hostname `db` from another container.)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arp}
      POSTGRES_USER: ${POSTGRES_USER:-arp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arp_password}
    ports:
      - "5432:5432"
    volumes:
      - arp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arp-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL:-postgresql://arp_user:arp_password@db:5432/arp?schema=public}
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3003
      DATABASE_URL: ${DATABASE_URL:-postgresql://arp_user:arp_password@db:5432/arp?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      # Required in real production; default only for local Docker bring-up.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-only-change-me-use-openssl-rand-base64-32}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFICATION_EMAIL_ADMINS: ${NOTIFICATION_EMAIL_ADMINS:-}
    ports:
      - "3003:3003"
    networks:
      - arp-network

volumes:
  arp_pgdata:

networks:
  arp-network:
    driver: bridge
