# Production-oriented stack: Postgres + Next.js (standalone image).
# Copy `.env.example` → `.env` and set secrets before `docker compose up`.
#
# NOTE: DATABASE_URL inside containers always uses hostname "db" (the Docker
# service name). The DATABASE_URL in your local .env (with localhost:5432) is
# only for running prisma commands directly from your machine.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arp}
      POSTGRES_USER: ${POSTGRES_USER:-arp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arp_password}
    ports:
      - "5432:5432"
    volumes:
      - arp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arp-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        DATABASE_URL: postgresql://arp_user:arp_password@db:5432/arp?schema=public
    command: sh -c "npx prisma migrate deploy && node scripts/seed-admin.mjs"
    environment:
      DATABASE_URL: postgresql://arp_user:arp_password@db:5432/arp?schema=public
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - arp-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://arp_user:arp_password@db:5432/arp?schema=public
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3003
      DATABASE_URL: postgresql://arp_user:arp_password@db:5432/arp?schema=public
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_ALLOWED_DOMAIN: ${GOOGLE_ALLOWED_DOMAIN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFICATION_EMAIL_ADMINS: ${NOTIFICATION_EMAIL_ADMINS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-512}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - arp-network

volumes:
  arp_pgdata:

networks:
  arp-network:
    driver: bridge
