services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arp}
      POSTGRES_USER: ${POSTGRES_USER:-arp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arp_password}
    ports:
      - "5432:5432"
    volumes:
      - arp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    ports:
      - "3003:3003"

volumes:
  arp_pgdata:

