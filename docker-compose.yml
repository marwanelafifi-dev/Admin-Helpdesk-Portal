version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: admin-request-platform-db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_password_123}
      POSTGRES_DB: ${DB_NAME:-admin_request_platform}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - admin-platform-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Next.js Frontend + App Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-request-platform-app
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${DB_USER:-admin}:${DB_PASSWORD:-admin_password_123}@db:5432/${DB_NAME:-admin_request_platform}

      # NextAuth Configuration
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3003}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key-change-in-production}

      # Google OAuth
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-780484706259-unbecqb6jo09imijtldp01h6p6noo8hf.apps.googleusercontent.com}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-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}

      # Node Environment
      NODE_ENV: ${NODE_ENV:-production}
      # Disable TLS cert check for corporate network
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      DISABLE_TLS_CERT_CHECK: "true"
    ports:
      - "${APP_PORT:-3003}:3003"
    networks:
      - admin-platform-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3003"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    labels:
      com.example.description: "Admin Request Platform Frontend"
      com.example.version: "1.0"

volumes:
  postgres_data:
    driver: local
    labels:
      com.example.description: "PostgreSQL data volume for Admin Request Platform"

networks:
  admin-platform-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
    labels:
      com.example.description: "Isolated network for Admin Request Platform services"
